<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DbD Perk Builder</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e10;
    --card-bg: #1a1a1e;
    --toprow-bg: #20201e;
    --desc-bg: #13130f;
    --gold: #c8a84b;
    --gold-dim: #8a6f2e;
    --divider: #2a2a2e;
    --text: #e0d8c8;
    --text-dim: #6a6460;
    --slot-empty-bg: #141416;
    --slot-border: #2e2e32;
    --radius: 6px;
    --font: 'Segoe UI', system-ui, sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    padding: 20px;
    user-select: none;
  }

  /* ── Title ── */
  .app-title-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 22px;
  }
  .app-title {
    color: var(--gold);
    font-size: 1.6rem;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .app-title-underline {
    height: 2px;
    background: var(--gold);
    margin-top: 6px;
  }

  /* ── Build slots 2×2 ── */
  .build-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }

  .build-slot {
    background: var(--card-bg);
    border: 1px solid var(--slot-border);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.15s;
    min-height: 90px;
  }
  .build-slot:hover { border-color: var(--gold-dim); }
  .build-slot.target-ready {
    border-color: var(--gold);
    box-shadow: 0 0 0 1px var(--gold);
  }

  .slot-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 140px;
    gap: 6px;
    color: var(--text-dim);
    font-size: 0.78rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .slot-empty .plus {
    font-size: 1.8rem;
    line-height: 1;
    color: var(--divider);
  }

  .slot-top {
    background: var(--toprow-bg);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: clamp(6px, 1vw, 12px) clamp(8px, 1.2vw, 14px);
    gap: clamp(6px, 1vw, 12px);
  }
  .slot-top .sname-text {
    flex: 1;
    color: var(--gold);
    font-size: clamp(0.85rem, 2vw, 1.5rem);
    font-weight: 700;
    letter-spacing: 0.03em;
    line-height: 1.25;
    word-break: break-word;
  }
  .slot-top .simages {
    display: flex;
    align-items: center;
    gap: clamp(4px, 0.6vw, 8px);
    flex-shrink: 0;
  }
  /* Icon native ratio: 204w × 213h ≈ 0.958 — nearly square
     Character native ratio: 252w × 323h ≈ 0.780
     Both images share the same vw-based height so they scale together with the slot */
  .slot-top .sicon {
    height: clamp(56px, 8vw, 110px);
    width:  clamp(54px, 7.7vw, 106px);
    object-fit: contain;
  }
  .slot-top .schar {
    height: clamp(56px, 8vw, 110px);
    width:  clamp(44px, 6vw,  86px);
    object-fit: contain;
  }
  .slot-bottom { background: var(--desc-bg); padding: 4px 6px; }
  .slot-bottom img { width: 100%; display: block; object-fit: contain; }

  /* ── Export panel ── */
  .export-panel {
    margin: 0 0 18px;
    background: var(--card-bg);
    border: 1px solid var(--divider);
    border-radius: var(--radius);
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .export-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .export-input {
    background: var(--bg);
    border: 1px solid var(--divider);
    border-radius: 4px;
    color: var(--text);
    font-family: var(--font);
    font-size: 0.85rem;
    padding: 7px 10px;
    outline: none;
    transition: border-color 0.15s;
  }
  .export-input:focus { border-color: var(--gold); }
  .export-buttons { display: flex; gap: 8px; }
  .btn {
    padding: 7px 16px;
    border-radius: 4px;
    font-family: var(--font);
    font-size: 0.82rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
    border: none;
  }
  .btn-export { background: transparent; border: 1px solid var(--gold); color: var(--gold); }
  .btn-export:hover { background: var(--gold); color: #0e0e10; }
  .btn-save { background: transparent; border: 1px solid var(--divider); color: var(--text-dim); cursor: not-allowed; }
  .btn-save.active { border-color: var(--gold); color: var(--gold); cursor: pointer; }
  .btn-save.active:hover { background: var(--gold); color: #0e0e10; }
  .export-url-row { display: none; flex-direction: column; gap: 4px; }
  .export-url-row.visible { display: flex; }
  .export-url {
    font-size: 0.78rem; color: var(--gold-dim);
    word-break: break-all; cursor: pointer;
    padding: 5px 8px; background: var(--bg);
    border-radius: 4px; border: 1px solid var(--divider);
    transition: color 0.15s;
  }
  .export-url:hover { color: var(--gold); }
  .copy-confirm { font-size: 0.78rem; color: #4caf50; display: none; }
  .copy-confirm.visible { display: block; }

  /* ── Search ── */
  .search-wrap {
    margin: 0 0 10px;
    display: flex; align-items: center; gap: 10px;
  }
  .search-input {
    flex: 1; background: var(--card-bg);
    border: 1px solid var(--divider); border-radius: 4px;
    color: var(--text); font-family: var(--font);
    font-size: 0.9rem; padding: 8px 12px;
    outline: none; transition: border-color 0.15s;
  }
  .search-input:focus { border-color: var(--gold); }
  .search-count { font-size: 0.78rem; color: var(--text-dim); white-space: nowrap; min-width: 110px; text-align: right; }

  /* ── Perk grid ── */
  .perk-grid-wrap {
    margin: 0 auto;
    max-height: 560px; overflow-y: auto;
    border: 1px solid var(--divider); border-radius: var(--radius);
    background: var(--card-bg); padding: 8px;
  }
  .perk-grid-wrap::-webkit-scrollbar { width: 6px; }
  .perk-grid-wrap::-webkit-scrollbar-track { background: var(--bg); }
  .perk-grid-wrap::-webkit-scrollbar-thumb { background: var(--divider); border-radius: 3px; }
  .perk-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(clamp(110px, 8vw, 160px), 1fr)); gap: 8px; }

  .perk-card {
    background: var(--slot-empty-bg);
    border: 2px solid transparent;
    border-radius: 4px; padding: 4px;
    cursor: pointer; display: flex;
    flex-direction: column; align-items: center;
    gap: 3px; transition: border-color 0.12s, opacity 0.12s;
    position: relative;
  }
  .perk-card:hover { border-color: var(--gold-dim); }
  .perk-card.selected { border-color: var(--gold); box-shadow: 0 0 0 1px var(--gold); }
  .perk-card.equipped { opacity: 0.35; cursor: default; }
  .perk-card .picon { width: 100%; aspect-ratio: 1; object-fit: contain; display: block; }
  .perk-card .pname-text {
    width: 100%; text-align: center;
    color: var(--gold);
    font-size: 0.72rem;
    font-weight: 600;
    line-height: 1.3;
    padding: 2px 2px 3px;
    word-break: break-word;
  }

  /* ── Tooltip ── */
  .tooltip {
    position: fixed; z-index: 9999; pointer-events: none;
    background: var(--desc-bg); border: 1px solid var(--gold-dim);
    border-radius: 5px; padding: 5px;
    /* Match roughly one slot card width — half the viewport minus gap and padding,
       clamped so it's always readable and never overflows on very large screens */
    width: clamp(320px, 44vw, 560px);
    box-shadow: 0 4px 18px rgba(0,0,0,0.7); display: none;
  }
  .tooltip.visible { display: block; }
  .tooltip img { width: 100%; display: block; }

  /* ── Loading ── */
  .loading {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 60vh; gap: 16px;
    color: var(--gold); font-size: 1rem;
    letter-spacing: 0.1em; text-transform: uppercase;
  }
  .loading-detail {
    font-size: 0.75rem; color: var(--text-dim);
    letter-spacing: 0.06em; margin-top: -8px;
  }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--divider);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="app">
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div>Loading perks…</div>
    <div class="loading-detail" id="loading-detail">Fetching chunk 1 of 5…</div>
  </div>
</div>

<div class="tooltip" id="tooltip"><img id="tooltip-img" src="" alt=""></div>

<script>
(async () => {

  // ── Load perk data from 3 split files in parallel ─────────────
  // perks_index.json maps every perk name → which chunk file it lives in (O(1) lookup)
  // perks_1/2/3/4/5.json each hold ~34-35 perks, all sorted by in-game order within their file

  const loadingDetail = document.getElementById('loading-detail');

  let perkIndex = {}; // name → "perks_1.json" | "perks_2.json" | "perks_3.json" | "perks_4.json" | "perks_5.json"
  let perks = {};     // name → { icon, name, description, character }

  try {
    // 1. Fetch the tiny index first (~5KB) — tells us which chunk holds each perk
    loadingDetail.textContent = 'Loading perk index…';
    const idxResp = await fetch('perks_index.json');
    if (!idxResp.ok) throw new Error('index');
    perkIndex = await idxResp.json();

    // 2. Fetch all 5 chunks in parallel
    loadingDetail.textContent = 'Loading perk data (5 chunks in parallel)…';
    const chunkFiles = ['perks_1.json', 'perks_2.json', 'perks_3.json', 'perks_4.json', 'perks_5.json'];
    const chunks = await Promise.all(
      chunkFiles.map(f => fetch(f).then(r => { if (!r.ok) throw new Error(f); return r.json(); }))
    );

    // 3. Merge all chunks into one flat lookup object
    chunks.forEach(chunk => Object.assign(perks, chunk));

  } catch(e) {
    document.getElementById('loading').innerHTML =
      `<div style="color:#c04040;text-align:center;line-height:1.8">
        Failed to load perk data.<br>
        Make sure <strong>index.html</strong>, <strong>perks_index.json</strong>,
        and <strong>perks_1/2/3/4/5.json</strong> are all in the same folder.
      </div>`;
    return;
  }

  // Sorted perk name list (alphabetical, matches how chunks were built)
  const perkNames = Object.keys(perkIndex).sort();
  const TOTAL = perkNames.length;

  // ── State ─────────────────────────────────────────────────────
  let build = [null, null, null, null];
  let selectedPerk = null;
  let exportReady = false;

  // ── Parse shared URL ──────────────────────────────────────────
  const urlParams = new URLSearchParams(window.location.search);
  let urlDecoded = null;
  if (urlParams.has('build')) {
    try {
      urlDecoded = JSON.parse(atob(urlParams.get('build')));
      if (urlDecoded.perks) {
        build = urlDecoded.perks.map(p => (p && perks[p]) ? p : null);
      }
    } catch(e) {}
  }

  // ── Build DOM ─────────────────────────────────────────────────
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="app-title-wrap">
      <div class="app-title" id="app-title-text">DbD Perk Builder</div>
      <div class="app-title-underline" id="app-title-underline"></div>
    </div>

    <div class="build-grid" id="build-grid">
      ${[0,1,2,3].map(i => `<div class="build-slot" id="slot-${i}" data-slot="${i}"></div>`).join('')}
    </div>

    <div class="export-panel">
      <div class="export-inputs">
        <input class="export-input" id="build-name" type="text" placeholder="Build name (Untitled)" autocomplete="off">
        <input class="export-input" id="creator-name" type="text" placeholder="Creator (Unknown)" autocomplete="off">
      </div>
      <div class="export-buttons">
        <button class="btn btn-export" id="btn-export">Export</button>
        <button class="btn btn-save" id="btn-save">Save Build as Image</button>
      </div>
      <div class="export-url-row" id="export-url-row">
        <div class="export-url" id="export-url" title="Click to copy"></div>
        <div class="copy-confirm" id="copy-confirm">Link copied to clipboard!</div>
      </div>
    </div>

    <div class="search-wrap">
      <input class="search-input" id="search-input" type="text" placeholder="Search perks…" autocomplete="off">
      <div class="search-count" id="search-count">All perks — ${TOTAL}</div>
    </div>

    <div class="perk-grid-wrap">
      <div class="perk-grid" id="perk-grid"></div>
    </div>
  `;

  // Title underline width
  const titleEl = document.getElementById('app-title-text');
  const underline = document.getElementById('app-title-underline');
  requestAnimationFrame(() => { underline.style.width = titleEl.offsetWidth + 'px'; });

  // Restore URL-loaded names
  if (urlDecoded) {
    if (urlDecoded.build) document.getElementById('build-name').value = urlDecoded.build;
    if (urlDecoded.creator) document.getElementById('creator-name').value = urlDecoded.creator;
  }

  // ── Render build slots ────────────────────────────────────────
  function renderSlots() {
    for (let i = 0; i < 4; i++) {
      const el = document.getElementById(`slot-${i}`);
      const perkName = build[i];
      if (!perkName || !perks[perkName]) {
        el.innerHTML = `<div class="slot-empty"><span class="plus">+</span><span>Slot ${i+1}</span></div>`;
      } else {
        const p = perks[perkName];
        el.innerHTML = `
          <div class="slot-top">
            <div class="sname-text">${perkName}</div>
            <div class="simages">
              <img class="sicon" src="${p.icon}" alt="${perkName}">
              <img class="schar" src="${p.character}" alt="">
            </div>
          </div>
          <div class="slot-bottom"><img src="${p.description}" alt=""></div>
        `;
      }
      el.classList.toggle('target-ready', selectedPerk !== null);
    }
  }

  // ── Render perk grid ──────────────────────────────────────────
  let filteredPerks = [...perkNames];

  function renderPerkGrid() {
    const grid = document.getElementById('perk-grid');
    grid.innerHTML = '';
    const equippedSet = new Set(build.filter(Boolean));
    filteredPerks.forEach(name => {
      const p = perks[name];
      if (!p) return;
      const card = document.createElement('div');
      card.className = 'perk-card';
      if (name === selectedPerk) card.classList.add('selected');
      if (equippedSet.has(name)) card.classList.add('equipped');
      card.dataset.perk = name;
      card.innerHTML = `<img class="picon" src="${p.icon}" alt="${name}"><div class="pname-text">${name}</div>`;
      grid.appendChild(card);
    });
  }

  function renderAll() { renderSlots(); renderPerkGrid(); }

  // ── Tooltip ───────────────────────────────────────────────────
  const tooltip = document.getElementById('tooltip');
  const tooltipImg = document.getElementById('tooltip-img');
  let tooltipTimer = null;
  let tooltipVisible = false;

  document.addEventListener('mousemove', (e) => {
    if (tooltipVisible) positionTooltip(e.clientX, e.clientY);
  });

  function positionTooltip(x, y) {
    const pad = 12;
    const tw = tooltip.offsetWidth || 280;
    const th = tooltip.offsetHeight || 80;
    let left = x + pad, top = y + pad;
    if (left + tw > window.innerWidth - 8) left = x - tw - pad;
    if (top + th > window.innerHeight - 8) top = y - th - pad;
    tooltip.style.left = left + 'px';
    tooltip.style.top = top + 'px';
  }

  document.getElementById('perk-grid').addEventListener('mouseover', (e) => {
    const card = e.target.closest('.perk-card');
    if (!card) return;
    clearTimeout(tooltipTimer);
    tooltipTimer = setTimeout(() => {
      const name = card.dataset.perk;
      if (!perks[name]) return;
      tooltipImg.src = perks[name].description;
      tooltip.classList.add('visible');
      tooltipVisible = true;
      const rect = card.getBoundingClientRect();
      positionTooltip(rect.right, rect.top);
    }, 1000);
  });

  document.getElementById('perk-grid').addEventListener('mouseout', () => {
    clearTimeout(tooltipTimer);
    tooltip.classList.remove('visible');
    tooltipVisible = false;
  });

  // ── Click: perk grid ──────────────────────────────────────────
  document.getElementById('perk-grid').addEventListener('click', (e) => {
    const card = e.target.closest('.perk-card');
    if (!card) return;
    const name = card.dataset.perk;
    if (build.includes(name)) return;
    clearTimeout(tooltipTimer);
    tooltip.classList.remove('visible');
    tooltipVisible = false;
    selectedPerk = (selectedPerk === name) ? null : name;
    renderAll();
  });

  // ── Click: build slot ─────────────────────────────────────────
  document.getElementById('build-grid').addEventListener('click', (e) => {
    const slotEl = e.target.closest('.build-slot');
    if (!slotEl) return;
    const idx = parseInt(slotEl.dataset.slot);
    if (selectedPerk !== null) {
      build[idx] = selectedPerk;
      selectedPerk = null;
      invalidateExport();
      renderAll();
    }
  });

  // ── Right-click: slot → unequip ───────────────────────────────
  document.getElementById('build-grid').addEventListener('contextmenu', (e) => {
    e.preventDefault();
    const slotEl = e.target.closest('.build-slot');
    if (!slotEl) return;
    build[parseInt(slotEl.dataset.slot)] = null;
    invalidateExport();
    renderAll();
  });

  // ── Right-click: blank → deselect ────────────────────────────
  document.addEventListener('contextmenu', (e) => {
    if (e.target.closest('.build-slot') || e.target.closest('.perk-card')) return;
    e.preventDefault();
    selectedPerk = null;
    renderAll();
  });

  // ── Search ────────────────────────────────────────────────────
  // Fast: perkIndex has all names as keys — O(1) membership check, O(n) scan for filter
  document.getElementById('search-input').addEventListener('input', (e) => {
    const q = e.target.value.trim().toLowerCase();
    if (!q) {
      filteredPerks = [...perkNames];
      document.getElementById('search-count').textContent = `All perks — ${TOTAL}`;
    } else {
      filteredPerks = perkNames.filter(n => {
        if (n.toLowerCase().includes(q)) return true;
        const t = perks[n] && perks[n].text ? perks[n].text.toLowerCase() : '';
        return t.includes(q);
      });
      document.getElementById('search-count').textContent =
        `${filteredPerks.length} result${filteredPerks.length !== 1 ? 's' : ''}`;
    }
    renderPerkGrid();
  });

  // ── Export ────────────────────────────────────────────────────
  function invalidateExport() {
    exportReady = false;
    document.getElementById('export-url-row').classList.remove('visible');
    document.getElementById('copy-confirm').classList.remove('visible');
    document.getElementById('btn-save').classList.remove('active');
  }

  document.getElementById('btn-export').addEventListener('click', () => {
    const buildName = document.getElementById('build-name').value.trim() || 'Untitled';
    const creatorName = document.getElementById('creator-name').value.trim() || 'Unknown';
    const data = { build: buildName, creator: creatorName, perks: build };
    const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
    const url = `${location.protocol}//${location.host}${location.pathname}?build=${encoded}`;
    const urlEl = document.getElementById('export-url');
    urlEl.textContent = url;
    urlEl.dataset.url = url;
    document.getElementById('export-url-row').classList.add('visible');
    document.getElementById('copy-confirm').classList.remove('visible');
    document.getElementById('btn-save').classList.add('active');
    exportReady = true;
  });

  document.getElementById('export-url').addEventListener('click', () => {
    const url = document.getElementById('export-url').dataset.url;
    navigator.clipboard.writeText(url).then(() => {
      document.getElementById('copy-confirm').classList.add('visible');
    });
  });

  document.getElementById('build-name').addEventListener('input', invalidateExport);
  document.getElementById('creator-name').addEventListener('input', invalidateExport);

  // ── Save as Image ─────────────────────────────────────────────
  document.getElementById('btn-save').addEventListener('click', async () => {
    if (!exportReady) return;
    const buildName = document.getElementById('build-name').value.trim() || 'Untitled';
    const creatorName = document.getElementById('creator-name').value.trim() || 'Unknown';

    const container = document.createElement('div');
    container.style.cssText = 'position:fixed;top:-9999px;left:-9999px;width:700px;background:#0e0e10;padding:24px 20px 20px;font-family:Segoe UI,system-ui,sans-serif;';

    const titleWrap = document.createElement('div');
    titleWrap.style.cssText = 'display:flex;flex-direction:column;align-items:center;margin-bottom:18px;';
    const titleText = document.createElement('div');
    titleText.style.cssText = 'color:#c8a84b;font-size:1.5rem;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;';
    titleText.textContent = buildName;
    const titleUnderline = document.createElement('div');
    titleUnderline.style.cssText = 'height:2px;background:#c8a84b;margin-top:5px;';
    titleWrap.appendChild(titleText);
    titleWrap.appendChild(titleUnderline);
    container.appendChild(titleWrap);
    document.body.appendChild(container);
    titleUnderline.style.width = titleText.offsetWidth + 'px';

    const grid = document.createElement('div');
    grid.style.cssText = 'display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;';
    for (let i = 0; i < 4; i++) {
      const perkName = build[i];
      const slot = document.createElement('div');
      slot.style.cssText = 'background:#1a1a1e;border:1px solid #2a2a2e;border-radius:6px;overflow:hidden;';
      if (perkName && perks[perkName]) {
        const p = perks[perkName];
        slot.innerHTML = `
          <div style="background:#20201e;display:flex;align-items:center;justify-content:space-between;padding:10px 12px;gap:10px;min-height:100px;">
            <div style="flex:1;color:#c8a84b;font-size:1.1rem;font-weight:700;letter-spacing:0.03em;line-height:1.25;word-break:break-word;">${perkName}</div>
            <div style="display:flex;align-items:center;gap:6px;flex-shrink:0;">
              <img src="${p.icon}" style="height:80px;width:77px;display:block;">
              <img src="${p.character}" style="height:80px;width:62px;display:block;">
            </div>
          </div>
          <div style="background:#13130f;padding:4px 6px;">
            <img src="${p.description}" style="width:100%;display:block;">
          </div>`;
      } else {
        slot.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:90px;color:#3a3a3e;font-size:1.6rem;">+</div>`;
      }
      grid.appendChild(slot);
    }
    container.appendChild(grid);

    const divider = document.createElement('div');
    divider.style.cssText = 'height:1px;background:#2a2a2e;margin:8px 0;';
    container.appendChild(divider);

    const byline = document.createElement('div');
    byline.style.cssText = 'text-align:center;color:#8a7a5a;font-size:0.85rem;margin-top:10px;letter-spacing:0.05em;';
    byline.textContent = `Created by ${creatorName}`;
    container.appendChild(byline);

    const watermark = document.createElement('div');
    watermark.style.cssText = 'text-align:center;color:#3a3530;font-size:0.72rem;margin-top:6px;letter-spacing:0.08em;text-transform:uppercase;';
    watermark.textContent = 'DbD Perk Builder';
    container.appendChild(watermark);

    await new Promise(r => setTimeout(r, 200));
    try {
      const canvas = await html2canvas(container, { backgroundColor: '#0e0e10', scale: 2, useCORS: true, logging: false });
      const link = document.createElement('a');
      link.download = `${buildName}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    } catch(err) {
      console.error('html2canvas error', err);
    } finally {
      document.body.removeChild(container);
    }
  });

  // ── Initial render ────────────────────────────────────────────
  renderAll();
})();
</script>
</body>
</html>
